name: task_tracker_app
description: Task Tracker App - Technical Test Implementation

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Network
  dio: ^5.3.3

  # Local Storage / Caching
  shared_preferences: ^2.2.1

  # DI
  get_it: ^7.6.4

  # Utils
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.3
  build_runner: ^2.4.7
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
